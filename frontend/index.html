<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="KisaanMitra - Voice-first agricultural assistant for Indian farmers">
    <meta name="theme-color" content="#1a5e1f">
    <title>KisaanMitra - किसानमित्र</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- SPLASH / LANGUAGE SELECTOR -->
    <div id="splash-screen" class="screen active">
        <div class="splash-content">
            <div class="logo-container">
                <div class="logo-icon">🌾</div>
                <h1 class="app-title">KisaanMitra</h1>
                <p class="app-subtitle">किसानमित्र</p>
                <p class="app-tagline" id="splash-tagline">आपका खेती साथी</p>
            </div>
            <div class="language-selector">
                <p class="lang-prompt">अपनी भाषा चुनें / Choose Language</p>
                <div class="lang-buttons">
                    <button class="lang-btn" data-lang="hi" data-speech="hi-IN">
                        <span class="lang-native">हिंदी</span>
                        <span class="lang-english">Hindi</span>
                    </button>
                    <button class="lang-btn" data-lang="kn" data-speech="kn-IN">
                        <span class="lang-native">ಕನ್ನಡ</span>
                        <span class="lang-english">Kannada</span>
                    </button>
                    <button class="lang-btn" data-lang="en" data-speech="en-IN">
                        <span class="lang-native">English</span>
                        <span class="lang-english">English</span>
                    </button>
                    <button class="lang-btn" data-lang="ta" data-speech="ta-IN">
                        <span class="lang-native">தமிழ்</span>
                        <span class="lang-english">Tamil</span>
                    </button>
                    <button class="lang-btn" data-lang="te" data-speech="te-IN">
                        <span class="lang-native">తెలుగు</span>
                        <span class="lang-english">Telugu</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN APP SCREEN -->
    <div id="main-screen" class="screen">
        <header class="top-bar">
            <div class="top-bar-left">
                <span class="header-icon">🌾</span>
                <span class="header-title">KisaanMitra</span>
            </div>
            <div class="top-bar-right">
                <button id="lang-switch-btn" class="icon-btn" title="Change Language">
                    <span id="current-lang-flag">हि</span>
                </button>
                <span id="online-status" class="status-dot online" title="Online"></span>
            </div>
        </header>

        <nav class="feature-nav">
            <button class="nav-card active" id="nav-ask" data-feature="ask">
                <span class="nav-icon">🎤</span>
                <span class="nav-label" data-i18n="nav_ask">पूछें</span>
            </button>
            <button class="nav-card" id="nav-prices" data-feature="prices">
                <span class="nav-icon">💰</span>
                <span class="nav-label" data-i18n="nav_prices">भाव</span>
            </button>
            <button class="nav-card" id="nav-weather" data-feature="weather">
                <span class="nav-icon">🌦️</span>
                <span class="nav-label" data-i18n="nav_weather">मौसम</span>
            </button>
            <button class="nav-card" id="nav-calendar" data-feature="calendar">
                <span class="nav-icon">📅</span>
                <span class="nav-label" data-i18n="nav_calendar">फसल</span>
            </button>
        </nav>

        <main class="content-area" id="content-area">
            <div id="welcome-section" class="section active">
                <div class="welcome-card">
                    <p class="welcome-text" data-i18n="welcome">नमस्ते! मैं किसानमित्र हूँ। नीचे माइक दबाकर अपना सवाल पूछें।</p>
                </div>
            </div>
            <div id="response-section" class="section"></div>
            <div id="prices-section" class="section">
                <div class="section-header"><h2 data-i18n="prices_title">📊 आज के भाव</h2></div>
                <div id="prices-list" class="card-list"></div>
            </div>
            <div id="weather-section" class="section">
                <div id="weather-content"></div>
            </div>
            <div id="calendar-section" class="section">
                <div id="calendar-content"></div>
            </div>
        </main>

        <div class="voice-area">
            <div id="voice-status" class="voice-status" data-i18n="voice_tap">माइक दबाएं और बोलें</div>
            <button id="mic-button" class="mic-button" aria-label="Speak">
                <svg class="mic-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                </svg>
            </button>
            <div id="voice-wave" class="voice-wave hidden">
                <span></span><span></span><span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loader">
            <div class="loader-spinner"></div>
            <p class="loader-text" data-i18n="loading">सोच रहा हूँ...</p>
        </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/speech.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
